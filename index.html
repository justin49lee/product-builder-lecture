<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 6/45 행운의 번호 추첨기 | AI & 프리미엄 분석기</title>
    <meta name="description" content="AI 번호 추천, 제외수/고정수 설정, 통계 분석을 제공하는 프리미엄 로또 6/45 추첨 사이트입니다.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-gold">
    <!-- Background Animated Blobs -->
    <div class="bg-glow blob-1"></div>
    <div class="bg-glow blob-2"></div>
    <div class="bg-glow blob-3"></div>

    <div class="app-container">
        <!-- Header Section -->
        <header class="main-header glass-panel">
            <div class="header-logo">
                <div class="logo-icon">🎰</div>
                <div>
                    <h1>LOTTO <span class="accent-text">PRO 6/45</span></h1>
                    <p class="subtitle">AI 알고리즘 & 필터링 기반 행운의 로또 추첨기</p>
                </div>
            </div>
            <div class="header-actions">
                <div class="color-legend">
                    <span class="legend-item ball-1-10">1~10</span>
                    <span class="legend-item ball-11-20">11~20</span>
                    <span class="legend-item ball-21-30">21~30</span>
                    <span class="legend-item ball-31-40">31~40</span>
                    <span class="legend-item ball-41-45">41~45</span>
                </div>
            </div>
        </header>

        <!-- Main Grid Layout -->
        <main class="lotto-grid">
            <!-- Left Column: Controls & Generator -->
            <section class="left-panel">
                <!-- Interactive Lotto Machine / Display -->
                <div class="glass-card machine-card">
                    <div class="machine-header">
                        <h2>🔮 번호 추첨 머신</h2>
                        <span class="status-badge" id="machine-status">READY</span>
                    </div>

                    <!-- Ball Animation Chamber -->
                    <div class="chamber-container">
                        <div class="chamber-glass">
                            <div class="chamber-balls" id="chamber-balls">
                                <!-- Dynamic floating background balls -->
                            </div>
                        </div>
                    </div>

                    <!-- Primary Result Balls Display -->
                    <div class="result-display" id="main-result-display">
                        <div class="placeholder-text">아래 버튼을 눌러 번호를 추첨하세요!</div>
                    </div>

                    <!-- Action Controls -->
                    <div class="action-bar">
                        <div class="game-count-selector">
                            <label for="game-count">추첨 게임 수:</label>
                            <select id="game-count" class="modern-select">
                                <option value="1">1 게임 (A)</option>
                                <option value="5" selected>5 게임 (A~E 세트)</option>
                                <option value="10">10 게임</option>
                            </select>
                        </div>
                        <button class="btn btn-primary btn-generate" id="btn-draw">
                            <span class="btn-icon">⚡</span>
                            <span>행운의 번호 추첨하기</span>
                        </button>
                    </div>
                </div>

                <!-- Advanced Filter Controls -->
                <div class="glass-card filter-card">
                    <div class="card-title-row">
                        <h3>🛠️ 맞춤 필터 설정</h3>
                        <button class="btn-text" id="btn-reset-filters">필터 초기화</button>
                    </div>

                    <div class="filter-group">
                        <label class="filter-label">📌 고정수 (반드시 포함할 번호 - 최대 5개)</label>
                        <div class="number-selector-grid" id="fixed-numbers-grid">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <div class="filter-group mt-15">
                        <label class="filter-label">🚫 제외수 (추첨에서 제외할 번호)</label>
                        <div class="number-selector-grid" id="excluded-numbers-grid">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- Right Column: Results List, Favorites & Analytics -->
            <section class="right-panel">
                <!-- Multi-Game Results List -->
                <div class="glass-card results-card">
                    <div class="card-title-row">
                        <h3>📜 추첨 결과 목록</h3>
                        <button class="btn btn-sm btn-secondary" id="btn-copy-all">
                            📋 전체 복사
                        </button>
                    </div>
                    <div class="results-list" id="games-results-container">
                        <div class="empty-state">추첨 버튼을 누르면 여기에 게임 세트가 생성됩니다.</div>
                    </div>
                </div>

                <!-- Analytics & History Section -->
                <div class="grid-2 mt-20">
                    <!-- Saved Favorites -->
                    <div class="glass-card favorites-card">
                        <div class="card-title-row">
                            <h3>⭐ 보관함 (<span id="fav-count">0</span>)</h3>
                            <button class="btn-text" id="btn-clear-favs">비우기</button>
                        </div>
                        <div class="favorites-list" id="favorites-list-container">
                            <div class="empty-state small">보관된 번호가 없습니다.</div>
                        </div>
                    </div>

                    <!-- Frequency Stats Card -->
                    <div class="glass-card stats-card">
                        <div class="card-title-row">
                            <h3>📊 번호대별 출현 빈도</h3>
                        </div>
                        <div class="stats-bars" id="stats-bars-container">
                            <div class="stat-bar-row">
                                <span class="stat-lbl">1~10번대</span>
                                <div class="stat-track"><div class="stat-fill ball-1-10-bg" style="width: 0%;" id="stat-bar-1"></div></div>
                                <span class="stat-num" id="stat-val-1">0%</span>
                            </div>
                            <div class="stat-bar-row">
                                <span class="stat-lbl">11~20번대</span>
                                <div class="stat-track"><div class="stat-fill ball-11-20-bg" style="width: 0%;" id="stat-bar-2"></div></div>
                                <span class="stat-num" id="stat-val-2">0%</span>
                            </div>
                            <div class="stat-bar-row">
                                <span class="stat-lbl">21~30번대</span>
                                <div class="stat-track"><div class="stat-fill ball-21-30-bg" style="width: 0%;" id="stat-bar-3"></div></div>
                                <span class="stat-num" id="stat-val-3">0%</span>
                            </div>
                            <div class="stat-bar-row">
                                <span class="stat-lbl">31~40번대</span>
                                <div class="stat-track"><div class="stat-fill ball-31-40-bg" style="width: 0%;" id="stat-bar-4"></div></div>
                                <span class="stat-num" id="stat-val-4">0%</span>
                            </div>
                            <div class="stat-bar-row">
                                <span class="stat-lbl">41~45번대</span>
                                <div class="stat-track"><div class="stat-fill ball-41-45-bg" style="width: 0%;" id="stat-bar-5"></div></div>
                                <span class="stat-num" id="stat-val-5">0%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">메시지 내용</div>

    <script src="app.js"></script>
</body>
</html>
